<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Panel interno — Donher's</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#0a0a0a; --panel:#141414; --panel2:#1b1b1b; --line:rgba(255,255,255,.09);
      --gold:#B99A52; --gold-soft:#D6BD73; --cream:#F5EFE3; --muted:#8a8a8a;
      --ok:#5f9e6b; --warn:#c9a84a; --danger:#b65151;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--cream);line-height:1.5;-webkit-font-smoothing:antialiased}
    h1,h2,h3{font-family:'Cormorant Garamond',serif;font-weight:600}
    a{color:var(--gold-soft)}
    .hidden{display:none!important}

    /* Login */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .login-card{width:100%;max-width:360px;background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:32px 26px;text-align:center}
    .login-card h1{font-size:28px;color:var(--cream)}
    .login-card .sub{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:4px 0 22px}
    .field{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:11px 13px;color:var(--cream);font-size:14px;font-family:inherit;margin-bottom:11px}
    .field:focus{outline:none;border-color:var(--gold)}
    .btn{width:100%;background:var(--gold);color:#1a1407;border:none;border-radius:8px;padding:12px;font-weight:500;font-size:14px;letter-spacing:1px;cursor:pointer;font-family:inherit}
    .btn:hover{background:var(--gold-soft)}
    .btn:disabled{opacity:.6;cursor:default}
    .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--cream);width:auto;padding:8px 14px;font-size:13px;border-radius:8px;cursor:pointer;font-family:inherit}
    .btn-ghost:hover{border-color:var(--gold)}
    .msg{font-size:13px;margin-top:10px;min-height:18px}
    .msg.error{color:var(--danger)}

    /* Panel */
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 22px;border-bottom:1px solid var(--line);background:var(--panel);position:sticky;top:0;z-index:10;flex-wrap:wrap}
    .topbar h1{font-size:24px}
    .topbar .who{font-size:12px;color:var(--muted)}
    .tabs{display:flex;gap:6px;padding:14px 22px 0;flex-wrap:wrap}
    .tab{background:transparent;border:1px solid var(--line);color:var(--muted);padding:8px 16px;border-radius:999px;cursor:pointer;font-family:inherit;font-size:13px}
    .tab.active{background:var(--gold);color:#1a1407;border-color:var(--gold);font-weight:500}
    .wrap{padding:20px 22px 60px;max-width:1100px;margin:0 auto}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px}
    .stat{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
    .stat .lbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
    .stat .num{font-size:30px;font-family:'Cormorant Garamond',serif;color:var(--gold-soft);margin-top:4px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:18px}
    .card-h{padding:13px 16px;border-bottom:1px solid var(--line);font-family:'Cormorant Garamond',serif;font-size:19px}
    table{width:100%;border-collapse:collapse;font-size:13.5px}
    th{text-align:left;color:var(--muted);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:10px 14px;border-bottom:1px solid var(--line)}
    td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.05);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    .pill{display:inline-block;font-size:11px;padding:3px 9px;border-radius:999px;background:rgba(185,154,82,.14);color:var(--gold-soft)}
    select.estado,input.cell{background:var(--panel2);border:1px solid var(--line);border-radius:6px;color:var(--cream);padding:6px 8px;font-family:inherit;font-size:13px}
    .row-actions{display:flex;gap:6px}
    .mini{font-size:12px;padding:5px 9px;border-radius:6px;border:1px solid var(--line);background:transparent;color:var(--cream);cursor:pointer;font-family:inherit}
    .mini:hover{border-color:var(--gold)}
    .mini.del:hover{border-color:var(--danger);color:var(--danger)}
    .empty{padding:26px;text-align:center;color:var(--muted);font-size:14px}
    .loading{padding:26px;text-align:center;color:var(--muted)}
    .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;padding:14px 16px;border-bottom:1px solid var(--line);background:var(--panel2)}
    .bars{display:flex;flex-direction:column;gap:8px;padding:14px 16px}
    .bar-row{display:flex;align-items:center;gap:10px;font-size:13px}
    .bar-row .name{width:140px;color:var(--cream)}
    .bar-track{flex:1;height:10px;background:var(--panel2);border-radius:6px;overflow:hidden}
    .bar-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-soft))}
    .bar-row .val{width:42px;text-align:right;color:var(--gold-soft)}
    /* ---- Galería + detalle de producto ---- */
    .foto-mini{width:38px;height:38px;object-fit:cover;border-radius:6px;display:block}
    .foto-cell .det-toggle{margin-top:5px;font-size:11px;white-space:nowrap}
    .detalle-row td{background:var(--panel2);padding:0}
    .detalle-row.hidden{display:none}
    .detalle-box{display:grid;grid-template-columns:1.4fr 1fr;gap:22px;padding:16px 18px;align-items:start}
    .det-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px}
    .det-lbl span{text-transform:none;letter-spacing:0;color:var(--gold-soft)}
    .galeria-admin{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;min-height:46px}
    .g-empty{color:var(--muted);font-size:12px;align-self:center}
    .gthumb{position:relative;width:62px;height:62px;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
    .gthumb.es-portada{border-color:var(--gold)}
    .gthumb img{width:100%;height:100%;object-fit:cover;display:block}
    .gthumb-x{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;border:none;background:rgba(0,0,0,.65);color:#fff;font-size:13px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .gthumb-x:hover{background:var(--danger)}
    .gthumb em{position:absolute;bottom:0;left:0;right:0;font-size:8px;text-align:center;background:var(--gold);color:#1a1407;font-style:normal;letter-spacing:.5px}
    .mini.up{display:inline-block;cursor:pointer}
    .det-desc textarea{width:100%;resize:vertical;line-height:1.45}
    .guardar-detalle{margin-top:10px}

    /* ---- Teléfono ---- */
    @media (max-width:680px){
      .topbar{padding:13px 14px}
      .topbar h1{font-size:20px}
      .tabs{padding:12px 14px 0}
      .wrap{padding:16px 12px 50px}
      .cards{grid-template-columns:repeat(2,1fr)}
      .form-grid{grid-template-columns:1fr 1fr}
      /* Las tablas se deslizan en lugar de cortarse */
      .card table{display:block;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
      .bar-row .name{width:90px}
      .detalle-box{grid-template-columns:1fr;gap:16px;white-space:normal}
    }
    @media (max-width:420px){
      .cards{grid-template-columns:1fr}
      .form-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

  <!-- ====== LOGIN ====== -->
  <div class="login-wrap" id="login-screen">
    <form class="login-card" id="login-form">
      <h1>Donher's</h1>
      <p class="sub">Panel interno</p>
      <input class="field" type="email" id="email" placeholder="Email" autocomplete="username" required>
      <input class="field" type="password" id="password" placeholder="Contraseña" autocomplete="current-password" required>
      <button class="btn" type="submit" id="login-btn">Ingresar</button>
      <p class="msg" id="login-msg"></p>
    </form>
  </div>

  <!-- ====== PANEL ====== -->
  <div id="panel" class="hidden">
    <div class="topbar">
      <div>
        <h1>Donher's <span style="color:var(--gold)">·</span> Panel</h1>
        <span class="who" id="who"></span>
      </div>
      <button class="btn-ghost" id="logout-btn">Cerrar sesión</button>
    </div>
    <div class="tabs">
      <button class="tab active" data-sec="stats">Estadísticas</button>
      <button class="tab" data-sec="pedidos">Pedidos</button>
      <button class="tab" data-sec="productos">Productos</button>
      <button class="tab" data-sec="clientes">Clientes</button>
    </div>
    <div class="wrap">
      <section id="sec-stats"></section>
      <section id="sec-pedidos" class="hidden"></section>
      <section id="sec-productos" class="hidden"></section>
      <section id="sec-clientes" class="hidden"></section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=1"></script>
  <script src="js/db.js?v=7"></script>
  <script src="js/admin.js?v=8"></script>
</body>
</html>
